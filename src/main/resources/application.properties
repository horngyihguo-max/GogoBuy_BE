spring.application.name=Gogobuy

#修改 server 啟動的 port，預設是 8080
#server.port=8083
#設定資料庫連接
# 3306是連接 mysql 的 port；p1141013 是要連接的資料庫名稱
# rewriteBatchedStatements=true: 可以批次新增
spring.datasource.url=jdbc:mysql://100.98.21.98:3306/gogobuy?serverTimezone=GMT%2B8&useSSL=false&rewriteBatchedStatements=true
spring.datasource.username=gogobuy
spring.datasource.password=gogobuy
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

#Session
server.servlet.session.cookie.same-site = none
server.servlet.session.cookie.secure = true
